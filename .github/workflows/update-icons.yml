name: Update Fabric Icons

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run update script
        run: python update.py

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Create pull request
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore: update Fabric icons from npm"
          title: "chore: update Fabric icons from npm"
          body: |
            Automated weekly update of Microsoft Fabric SVG icons from the `@fabric-msft/svg-icons` npm package.

            Generated by the [Update Fabric Icons](${{ github.server_url }}/${{ github.repository }}/actions/workflows/update-icons.yml) workflow.
          branch: automated/update-icons
          delete-branch: true
          labels: automated
